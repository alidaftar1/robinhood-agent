name: autopilot

# Cloud autopilot in PROPOSE MODE (2026-07-01): the owner's stand-in engineer.
# Reviews each morning's run like the owner would, and when it finds a real recurring
# issue it diagnoses the root cause and opens a PR proposing a guardrail — it does NOT
# deploy or push to main. No Vercel token/CLI here, so deploying is impossible by design;
# the owner reviews + merges. See .github/autopilot-prompt.md.
on:
  # Triggered by the Vercel 8am /api/autopilot cron (workflow_dispatch via the GitHub
  # API) right after the morning report — so the code-fixer runs ~8:05am PT with no
  # GitHub scheduler lag. The old `schedule:` cron was removed 2026-06-30: it fired a
  # redundant 2nd run ~10:30am PT (GitHub delays scheduled jobs ~1.5h). If a dispatch
  # ever fails, the morning report email still goes out (separate path); worst case is
  # one missed code-fix pass. Re-add a `schedule:` block here to restore a fallback.
  workflow_dispatch: {}

permissions:
  contents: write        # push the proposal branch
  pull-requests: write   # open the proposal PR
  issues: write          # maintain the "Autopilot Journal" issue (persistent memory)

concurrency:
  group: autopilot
  cancel-in-progress: false

jobs:
  autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_URL: https://robinhood-agent.vercel.app
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      GH_TOKEN: ${{ github.token }}   # gh pr create + branch push
      # No VERCEL_* here on purpose — propose mode cannot deploy.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code
      - name: Configure git for autonomous commits
        run: |
          git config user.name "robinhood-autopilot[bot]"
          git config user.email "autopilot@users.noreply.github.com"
      - name: Run autopilot agent
        run: claude -p "$(cat .github/autopilot-prompt.md)" --dangerously-skip-permissions --output-format text
