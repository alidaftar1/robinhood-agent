name: Manual Cron Trigger

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Endpoint to call (e.g. /api/trade)"
        required: false
        default: "/api/trade"

env:
  APP_URL: https://robinhood-agent.vercel.app

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call endpoint
        run: |
          curl -sf --max-time 290 -X GET "${{ env.APP_URL }}${{ github.event.inputs.endpoint }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
