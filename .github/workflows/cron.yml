name: Scheduled Crons

on:
  schedule:
    - cron: "30 13 * * 1-5"  # /api/insider — 6:30am PT
    - cron: "30 14 * * 1-5"  # /api/trade — 7:30am PT
    - cron: "0 15 * * 1-5"   # /api/autopilot — 8:00am PT
    - cron: "0 17 * * 1-5"   # /api/drop-check — 10:00am PT
    - cron: "0 19 * * 1-5"   # /api/earnings-exit — 12:00pm PT
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Endpoint to call (e.g. /api/trade)"
        required: false
        default: "/api/trade"

env:
  APP_URL: https://robinhood-agent.vercel.app

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Determine endpoint
        id: route
        run: |
          if [ -n "${{ github.event.inputs.endpoint }}" ]; then
            echo "endpoint=${{ github.event.inputs.endpoint }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "30 13 * * 1-5") echo "endpoint=/api/insider" >> "$GITHUB_OUTPUT" ;;
              "30 14 * * 1-5") echo "endpoint=/api/trade" >> "$GITHUB_OUTPUT" ;;
              "0 15 * * 1-5") echo "endpoint=/api/autopilot" >> "$GITHUB_OUTPUT" ;;
              "0 17 * * 1-5") echo "endpoint=/api/drop-check" >> "$GITHUB_OUTPUT" ;;
              "0 19 * * 1-5") echo "endpoint=/api/earnings-exit" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - name: Call endpoint
        run: |
          curl -sf --max-time 290 -X GET "${{ env.APP_URL }}${{ steps.route.outputs.endpoint }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
